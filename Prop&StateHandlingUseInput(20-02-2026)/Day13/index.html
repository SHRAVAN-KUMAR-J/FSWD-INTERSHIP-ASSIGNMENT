<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Hero Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Build Modern Websites</h1>
            <p>
                Create responsive and user-friendly websites using
                HTML, CSS, and Flexbox. Design once and make it work
                beautifully on all devices.
            </p>
            <div class="buttons">
                <button class="btn primary">Get Started</button>
                <button class="btn secondary">Learn More</button>
            </div>
        </div>

        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="Web Development">
        </div>
    </section>

</body>
</html>
